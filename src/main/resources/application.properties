server.port=${SERVER_PORT:8081}
spring.application.name=ecommerce-tpo

# URL base pública del backend, usada para armar URLs absolutas de imágenes
# fuera de un request HTTP (DataSeeder). Overrideable con APP_BASE_URL.
app.base-url=${APP_BASE_URL:http://localhost:${server.port}}

# MySQL — los valores sensibles se toman de variables de entorno o de
# application-local.properties (archivo local no versionado, ver README).
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecommerce}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Carga opcional del archivo local de cada dev (gitignored).
# Si existe application-local.properties, sus valores sobrescriben los de arriba.
spring.config.import=optional:classpath:application-local.properties

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Actuator
management.endpoints.web.exposure.include=health,info

# Subida de archivos (imágenes de productos)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Mail (SMTP — configurar en application-local.properties o variables de entorno)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT  (expiración: 7 días)
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=604800000
